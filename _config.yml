title: "Aadithyan S Nair"
name: "Aadithyan S Nair"
description: "Mechanical Engineering Undergraduate | Robotics | CAD | Additive Manufacturing"

theme: jekyll-theme-architect

plugins:
  - jekyll-include-cache

locale: "en-US"

author:
  name: "Aadithyan S Nair"
  avatar: "/assets/images/profile.jpg"
  bio: "Mechanical Engineering Undergraduate at NIT Calicut."
  location: "Kerala, India"

  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/YOUR_USERNAME"

    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/YOUR_LINKEDIN"

    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:your@email.com"

minimal_mistakes_skin: "default"

search: true

breadcrumbs: false
words_per_minute: 180

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/YOUR_USERNAME"

collections:
  projects:
    output: true
    permalink: /:collection/:path/

markdown: kramdown
highlighter: rouge

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
